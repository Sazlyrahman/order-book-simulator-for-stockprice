<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Price Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .price-display { text-align: center; font-size: 28px; margin-bottom: 20px; font-weight: bold; color: #007bff; }
        .order-form { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 5px; }
        .order-form input, .order-form select, .order-form button { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        .order-form button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        .order-form button:hover { background: #218838; }
        .order-book { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .column { width: 48%; }
        .column h2 { text-align: center; margin-bottom: 10px; }
        .bids h2 { color: #28a745; }
        .asks h2 { color: #dc3545; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f9fa; }
        #log { max-height: 150px; overflow-y: auto; background: #333; color: #0f0; padding: 10px; font-family: monospace; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Order Book Simulator</h1>
    
    <div class="price-display">
        Last Traded Price: $<span id="lastPrice">50.50</span>
    </div>

    <div class="order-form">
        <select id="orderType">
            <option value="buy">Buy (Bid)</option>
            <option value="sell">Sell (Ask)</option>
        </select>
        <input type="number" id="orderQty" placeholder="Quantity (e.g. 5)" min="1">
        <input type="number" id="orderPrice" placeholder="Price (e.g. 50)" min="1">
        <button onclick="submitOrder()">Submit Order</button>
    </div>

    <div class="order-book">
        <div class="column bids">
            <h2>Buyers (Bids)</h2>
            <table>
                <thead><tr><th>Quantity</th><th>Price</th></tr></thead>
                <tbody id="bidsTable"></tbody>
            </table>
        </div>
        <div class="column asks">
            <h2>Sellers (Asks)</h2>
            <table>
                <thead><tr><th>Price</th><th>Quantity</th></tr></thead>
                <tbody id="asksTable"></tbody>
            </table>
        </div>
    </div>

    <h3>Trade History</h3>
    <div id="log">System ready. Waiting for orders...<br></div>
</div>

<script>
    // Initial State based on our earlier example
    let lastPrice = 50.50;
    let bids = [ {price: 50, qty: 20}, {price: 49, qty: 8}, {price: 48, qty: 5} ];
    let asks = [ {price: 51, qty: 10}, {price: 52, qty: 15}, {price: 53, qty: 12} ];

    function render() {
        document.getElementById('lastPrice').innerText = lastPrice.toFixed(2);
        
        // Sort Bids highest to lowest
        bids.sort((a, b) => b.price - a.price);
        // Sort Asks lowest to highest
        asks.sort((a, b) => a.price - b.price);

        const bidsTable = document.getElementById('bidsTable');
        bidsTable.innerHTML = '';
        bids.forEach(b => {
            bidsTable.innerHTML += `<tr><td>${b.qty}</td><td>$${b.price.toFixed(2)}</td></tr>`;
        });

        const asksTable = document.getElementById('asksTable');
        asksTable.innerHTML = '';
        asks.forEach(a => {
            asksTable.innerHTML += `<tr><td>$${a.price.toFixed(2)}</td><td>${a.qty}</td></tr>`;
        });
    }

    function logTrade(msg) {
        const logBox = document.getElementById('log');
        logBox.innerHTML = msg + "<br>" + logBox.innerHTML;
    }

    function matchOrders() {
        let matched = false;
        
        while (bids.length > 0 && asks.length > 0 && bids[0].price >= asks[0].price) {
            matched = true;
            let tradePrice = asks[0].price; // Price goes to the resting order
            let tradeQty = Math.min(bids[0].qty, asks[0].qty);

            lastPrice = tradePrice;
            logTrade(`[TRADE] ${tradeQty} shares exchanged at $${tradePrice.toFixed(2)}`);

            bids[0].qty -= tradeQty;
            asks[0].qty -= tradeQty;

            if (bids[0].qty === 0) bids.shift();
            if (asks[0].qty === 0) asks.shift();
        }
        
        if (matched) render();
    }

    function submitOrder() {
        const type = document.getElementById('orderType').value;
        const qty = parseInt(document.getElementById('orderQty').value);
        const price = parseFloat(document.getElementById('orderPrice').value);

        if (!qty || !price || qty <= 0 || price <= 0) {
            alert("Please enter a valid quantity and price.");
            return;
        }

        if (type === 'buy') {
            logTrade(`[NEW ORDER] Added Buy Bid for ${qty} shares at $${price.toFixed(2)}`);
            bids.push({price: price, qty: qty});
        } else {
            logTrade(`[NEW ORDER] Added Sell Ask for ${qty} shares at $${price.toFixed(2)}`);
            asks.push({price: price, qty: qty});
        }

        render();
        matchOrders(); // Check if the new order triggers a trade
    }

    // Initial render
    render();
</script>

</body>
</html>
